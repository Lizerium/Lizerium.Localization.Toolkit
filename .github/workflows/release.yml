name: Lizerium Localization Toolkit Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  DOTNET_VERSION: 8.0.x
  CONFIGURATION: Release
  RID: win-x64
  ARTIFACT_PREFIX: Lizerium.Localization.Toolkit

jobs:
  release:
    name: Build release assets
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Resolve release version
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          if ($version -eq "main" -or $version -eq "master") {
            $version = "0.0.0-ci"
          }
          if ($version.StartsWith("v")) {
            $version = $version.Substring(1)
          }

          "PACKAGE_VERSION=$version" >> $env:GITHUB_ENV
          "RELEASE_TAG=${{ github.ref_name }}" >> $env:GITHUB_ENV

      - name: Restore solution
        run: dotnet restore Lizerium.Localization.Toolkit.sln

      - name: Build solution
        run: dotnet build Lizerium.Localization.Toolkit.sln -c ${{ env.CONFIGURATION }} --no-restore

      - name: Test AI localization
        run: >
          dotnet test src/Lizerium.AI.LocalizationAssistant.Tests/Lizerium.AI.LocalizationAssistant.Tests.csproj
          -c ${{ env.CONFIGURATION }}
          --no-restore
          --no-build

      - name: Pack NuGet packages
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force artifacts/nuget | Out-Null

          $projects = @(
            "src/Lizerium.Localization.Core/Lizerium.Localization.Core.csproj",
            "src/Lizerium.AI.LocalizationAssistant.Core/Lizerium.AI.LocalizationAssistant.Core.csproj",
            "src/Lizerium.Localization.Generator/Lizerium.Localization.Generator.csproj",
            "src/Lizerium.Localization.Analyzer/Lizerium.Localization.Analyzer.csproj",
            "src/Lizerium.Localization.Ai.Analyzer/Lizerium.Localization.Ai.Analyzer.csproj",
            "src/Lizerium.Localization.Toolkit/Lizerium.Localization.Toolkit.csproj",
            "src/Lizerium.Localization.GUI/Lizerium.Localization.GUI.csproj"
          )

          foreach ($project in $projects) {
            dotnet pack $project `
              -c $env:CONFIGURATION `
              -p:Version=$env:PACKAGE_VERSION `
              -p:PackageVersion=$env:PACKAGE_VERSION `
              -o artifacts/nuget `
              --no-restore `
              --no-build
          }

      - name: Build VSIX
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force artifacts/vsix | Out-Null

          msbuild src/Lizerium.Localization.Xaml.Vsix/Lizerium.Localization.Xaml.Vsix.csproj `
            /t:Build `
            /p:Configuration=$env:CONFIGURATION `
            /p:RestorePackages=false `
            /p:Version=$env:PACKAGE_VERSION `
            /v:minimal

          Copy-Item `
            src/Lizerium.Localization.Xaml.Vsix/bin/$env:CONFIGURATION/net472/Lizerium.Localization.Xaml.Vsix.vsix `
            artifacts/vsix/Lizerium.Localization.Xaml.Vsix-$env:RELEASE_TAG.vsix `
            -Force

      - name: Restore publish projects
        run: |
          dotnet restore src/Lizerium.Localization.GUI/Lizerium.Localization.GUI.csproj -r ${{ env.RID }}
          dotnet restore samples/WpfSampleApp/WpfSampleApp.csproj -r ${{ env.RID }}

      - name: Publish GUI
        run: >
          dotnet publish src/Lizerium.Localization.GUI/Lizerium.Localization.GUI.csproj
          -c ${{ env.CONFIGURATION }}
          -r ${{ env.RID }}
          --self-contained true
          --no-restore
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:DebugType=None
          -p:DebugSymbols=false
          -o artifacts/publish/gui/${{ env.RID }}

      - name: Publish Sample
        run: >
          dotnet publish samples/WpfSampleApp/WpfSampleApp.csproj
          -c ${{ env.CONFIGURATION }}
          -r ${{ env.RID }}
          --self-contained true
          --no-restore
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:DebugType=None
          -p:DebugSymbols=false
          -o artifacts/publish/sample/${{ env.RID }}

      - name: Pack release assets
        shell: pwsh
        run: |
          $tag = $env:RELEASE_TAG
          $prefix = "${{ env.ARTIFACT_PREFIX }}"
          New-Item -ItemType Directory -Force artifacts/release | Out-Null

          Compress-Archive `
            -Path artifacts/publish/gui/${{ env.RID }}/* `
            -DestinationPath "artifacts/release/$prefix-GUI-$tag-${{ env.RID }}.zip" `
            -Force

          Compress-Archive `
            -Path artifacts/publish/sample/${{ env.RID }}/* `
            -DestinationPath "artifacts/release/$prefix-Sample-$tag-${{ env.RID }}.zip" `
            -Force

          Compress-Archive `
            -Path artifacts/nuget/*.nupkg `
            -DestinationPath "artifacts/release/$prefix-NuGet-$tag.zip" `
            -Force

          Compress-Archive `
            -Path samples/WpfSampleApp/* `
            -DestinationPath "artifacts/release/$prefix-SampleSource-$tag.zip" `
            -Force

          Copy-Item artifacts/vsix/*.vsix artifacts/release/ -Force

          Get-ChildItem artifacts/release -File |
            Get-FileHash -Algorithm SHA256 |
            ForEach-Object { "$($_.Hash)  $(Split-Path $_.Path -Leaf)" } |
            Set-Content "artifacts/release/SHA256SUMS.txt" -Encoding UTF8

          $releaseNotes = @"
          ## Lizerium.Localization.Toolkit $tag

          A release for the `.resx` localization workflow: runtime, source generator, analyzers, AI translation helpers, GUI editor, sample app, and Visual Studio XAML VSIX.

          ### Included

          - NuGet packages: Toolkit, Core, AI Core, Generator, Analyzer, AI Analyzer, GUI
          - Visual Studio 2022 VSIX: `Lizerium.Localization.Xaml.Vsix-$tag.vsix`
          - Windows x64 standalone GUI editor
          - Windows x64 published WPF sample application
          - Sample project source archive
          - SHA-256 checksums

          ### VSIX

          The VSIX is a standalone Visual Studio editor extension. It is not a runtime dependency of target applications.

          It converts WPF XAML literals into localization markup, writes `Resources/Localization/Strings.en.resx` and `Strings.ru.resx`, and generates translations through Ollama with LibreTranslate fallback.

          Runtime behavior:

          - If the target project already has `LocExtension`, the VSIX reuses it.
          - If the target project has no `LocExtension`, the VSIX adds a small source-only runtime under `LizeriumGenerated/Localization`.
          - Generated keys are ASCII and stable; translated text is written only into RESX values.

          ### NuGet Compatibility

          The VSIX does not conflict with `Lizerium.Localization.Toolkit`.

          With the NuGet package installed, the project already has runtime localization support, generator, and analyzers. The VSIX only edits XAML and RESX files. It does not add a PackageReference and does not replace the NuGet runtime.

          ### Install NuGet From The Release Archive

          ```powershell
          Expand-Archive .\$prefix-NuGet-$tag.zip .\packages
          dotnet nuget add source .\packages -n LizeriumLocal
          dotnet add path\to\YourProject.csproj package Lizerium.Localization.Toolkit --version $env:PACKAGE_VERSION --source .\packages
          ```

          ### Install VSIX

          Download `Lizerium.Localization.Xaml.Vsix-$tag.vsix`, close Visual Studio, install it, then reopen Visual Studio.

          ### GUI Usage

          Download the GUI archive, extract it, and run:

          ```powershell
          .\Lizerium.Localization.GUI.exe
          ```
          "@

          $releaseNotes | Set-Content "artifacts/release/RELEASE_NOTES.md" -Encoding UTF8

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-${{ github.ref_name }}
          path: artifacts/release/*

      - name: Upload GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body_path: artifacts/release/RELEASE_NOTES.md
          files: |
            artifacts/release/*.zip
            artifacts/release/*.vsix
            artifacts/release/SHA256SUMS.txt
